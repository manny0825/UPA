<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" role="img" aria-labelledby="title desc">
  <title id="title">まる皿うぱ ロゴ案5 店主推し人柄型</title>
  <desc id="desc">うぱの文字を大きく扱い、文字と笑顔が一体になった覚えやすいワードマーク案。</desc>
  <defs>
    <style>
      .jp {
        font-family: "Noto Sans JP", "BIZ UDPGothic", "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
        font-weight: 900;
        letter-spacing: 0;
      }
      .latin {
        font-family: Impact, "Arial Black", sans-serif;
        letter-spacing: .08em;
      }
      .ink { fill: #15120e; }
      .cream { fill: #fffaf0; }
      .blue { fill: #2357c6; }
      .red { fill: #e7472f; }
      .yellow { fill: #f4c841; }
      .line { fill: none; stroke: #15120e; stroke-width: 18; stroke-linecap: round; stroke-linejoin: round; }
      .cream-stroke { stroke: #fffaf0; stroke-width: 18; stroke-linejoin: round; paint-order: stroke fill; }
      .blue-stroke { stroke: #2357c6; stroke-width: 8; stroke-linejoin: round; paint-order: stroke fill; }
    </style>
  </defs>

  <text x="550" y="112" text-anchor="middle" class="jp blue cream-stroke" font-size="68">裏アビコ酒場</text>
  <text x="550" y="230" text-anchor="middle" class="jp ink cream-stroke" font-size="96">まる皿</text>

  <g transform="translate(42 48)">
    <text x="510" y="520" text-anchor="middle" class="jp blue cream-stroke" font-size="330">うぱ</text>
    <circle cx="734" cy="384" r="36" class="cream blue-stroke"/>
    <circle cx="734" cy="384" r="9" class="ink"/>
    <circle cx="840" cy="384" r="9" class="ink"/>
    <path d="M720 454c48 34 112 34 156 0" fill="none" stroke="#15120e" stroke-width="13" stroke-linecap="round"/>
    <path d="M716 276c54-72 150-56 168 12 14 54-24 96-88 98-42 2-76-16-86-52" class="ink"/>
    <path d="M736 304c34-26 76-30 112-8" fill="none" stroke="#fffaf0" stroke-width="10" stroke-linecap="round" opacity=".72"/>
  </g>

  <path d="M200 595c190 78 505 86 700 0" fill="none" stroke="#e7472f" stroke-width="14" stroke-linecap="round"/>
  <text x="550" y="675" text-anchor="middle" class="latin red" font-size="40">MARUZARA UPA</text>
</svg>
