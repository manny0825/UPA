<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-labelledby="title desc">
  <title id="title">まる皿うぱ ロゴ案2 丸皿シンボル型</title>
  <desc id="desc">丸皿をシンボルにし、SNSアイコンや看板にも使いやすい円形ロゴ案。</desc>
  <defs>
    <style>
      .jp {
        font-family: "Noto Sans JP", "BIZ UDPGothic", "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
        font-weight: 900;
        letter-spacing: 0;
      }
      .latin {
        font-family: Impact, "Arial Black", sans-serif;
        letter-spacing: .08em;
      }
      .ink { fill: #15120e; }
      .paper { fill: #fffaf0; }
      .yellow { fill: #f4c841; }
      .red { fill: #e7472f; }
      .blue { fill: #2357c6; }
      .green { fill: #159b68; }
      .plate-line { fill: none; stroke: #15120e; stroke-width: 16; stroke-linecap: round; stroke-linejoin: round; }
      .rim { fill: none; stroke: #e7472f; stroke-width: 34; stroke-dasharray: 20 30; stroke-linecap: round; }
      .cream-stroke { stroke: #fffaf0; stroke-width: 16; stroke-linejoin: round; paint-order: stroke fill; }
    </style>
  </defs>

  <circle cx="450" cy="450" r="382" class="paper"/>
  <circle cx="450" cy="450" r="382" class="plate-line"/>
  <circle cx="450" cy="450" r="318" class="rim" opacity=".95"/>
  <circle cx="450" cy="450" r="256" fill="none" stroke="#2357c6" stroke-width="14"/>

  <g transform="rotate(28 662 216)" opacity=".92">
    <rect x="652" y="128" width="16" height="172" rx="8" class="ink"/>
    <rect x="686" y="128" width="16" height="172" rx="8" class="ink"/>
  </g>

  <text x="450" y="252" text-anchor="middle" class="jp blue cream-stroke" font-size="60">裏アビコ酒場</text>
  <text x="450" y="512" text-anchor="middle" class="jp ink cream-stroke" font-size="214">うぱ</text>
  <text x="450" y="635" text-anchor="middle" class="jp red cream-stroke" font-size="88">まる皿</text>

  <g transform="translate(450 700)">
    <circle cx="-118" cy="0" r="18" class="green"/>
    <circle cx="-62" cy="18" r="13" class="yellow"/>
    <circle cx="0" cy="0" r="18" class="red"/>
    <circle cx="62" cy="18" r="13" class="green"/>
    <circle cx="118" cy="0" r="18" class="yellow"/>
  </g>
  <text x="450" y="805" text-anchor="middle" class="latin ink" font-size="34">MARUZARA UPA</text>
</svg>
